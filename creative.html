<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creative Storyteller — Bertram L. Moore III</title>
<meta name="description" content="Photography and creative storytelling by Bertram L. Moore III — a visual diary of culture, community, and the subtle art of being fly." />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=Source+Sans+3:wght@200;300;400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:          #0a0807; /* Darker for higher impact */
  --bg-cream:    #f5f1e8;
  --eggplant:    #614051;
  --gold:        #dcc48e;
  --text:        #f5f1e8;
  --muted:       rgba(245,241,232,0.5);
  --rule:        rgba(245,241,232,0.1);
  --ease-expo:   cubic-bezier(0.85, 0, 0.15, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden; /* Gallery fills viewport */
  color: var(--text);
  image-rendering: -webkit-optimize-contrast;
}

/* ── INTRO TYPEWRITER ── */
#creative-intro {
  position: fixed;
  inset: 0;
  z-index: 3000;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
}
.typewriter-text {
  font-family: 'Source Sans 3', sans-serif;
  font-size: clamp(1.1rem, 5vw, 2.2rem);
  font-weight: 300;
  line-height: 1.5;
  letter-spacing: 0.05em;
  color: #fff;
  max-width: 800px;
  min-height: 4.5em; /* Prevent layout jump */
  white-space: pre-wrap; /* Allow newlines */
}
.typewriter-cursor {
  display: inline-block;
  width: 2px;
  height: 1.2em;
  background: var(--gold);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink {
  from, to { opacity: 1; }
  50% { opacity: 0; }
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 2rem 3rem;
  mix-blend-mode: difference;
  pointer-events: none;
}
.nav-logo, .nav-links, .nav-cta { pointer-events: auto; }
.nav-logo { display: flex; align-items: center; text-decoration: none; }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a {
  font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: #fff; text-decoration: none;
  transition: opacity 0.4s var(--ease-expo);
}
.nav-links a:hover { opacity: 0.5; }
.nav-cta {
  font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  background: #fff; color: #000;
  padding: 0.6rem 1.6rem; border-radius: 999px;
  text-decoration: none; transition: transform 0.4s var(--ease-expo), background 0.4s;
}
.nav-cta:hover { transform: scale(1.05); background: var(--gold); }

/* ── STRIP GALLERY ── */
.gallery-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  overflow: hidden;
  background: #000;
}

.strip {
  position: relative;
  flex: 1;
  height: 100vh;
  overflow: hidden;
  cursor: pointer;
  opacity: 0;
  transform: translateY(20px); 
  transition: 
    flex 0.8s var(--ease-expo), 
    transform 0.9s ease,
    opacity 0.9s ease,
    filter 0.5s ease;
  border-right: 1px solid rgba(255,255,255,0.03);
  will-change: flex, transform;
}

.strip:last-child { border-right: none; }

.strip img {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%) scale(1.1);
  height: 100%;
  width: auto;
  min-width: 100%;
  object-fit: cover;
  transition: transform 0.8s var(--ease-expo), filter 0.5s ease;
  filter: grayscale(0.2) brightness(0.6);
  image-rendering: -webkit-optimize-contrast;
  pointer-events: none;
}

/* Eggplant Overlay */
.strip::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--eggplant);
  opacity: 0.35; /* Lightened from 0.6 */
  mix-blend-mode: multiply;
  transition: opacity 0.7s var(--ease-expo);
  z-index: 5;
  pointer-events: none;
}

.strip:hover { flex: 1.4; filter: brightness(1.1); }
.strip:hover img { transform: translateX(-50%) scale(1.02); filter: grayscale(0) brightness(1); }
.strip:hover::after { opacity: 0; }

.strip-label {
  position: absolute;
  bottom: 2rem;
  left: 2rem;
  z-index: 10;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.45rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #fff;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s var(--ease-expo), transform 0.5s var(--ease-expo);
  transform: translateY(10px);
}
.strip-label.dark { color: #000; }
.strip:hover .strip-label { opacity: 1; transform: translateY(0); }

/* ── FULLSCREEN SLIDER (MODAL) ── */
.fullscreen-slider {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  visibility: hidden;
  pointer-events: none;
}

.fullscreen-slider.active {
  visibility: visible;
  pointer-events: auto;
}

/* Expansion Animation Layer */
.expansion-layer {
  position: fixed;
  z-index: 2001;
  pointer-events: none;
  background: #000;
  overflow: hidden;
  transition: all 0.8s var(--ease-expo);
}
.expansion-layer img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 10vh 12vw;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s var(--ease-expo);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.slide.active { opacity: 1; }

.slide img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 10vh 12vw;
  transform: scale(1.03);
  transition: transform 1.2s var(--ease-expo);
}
.slide.active img { transform: scale(1); }

/* Lightbox UI */
.slider-ui {
  position: absolute;
  inset: 0;
  z-index: 2010;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 3rem 4rem;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s var(--ease-expo) 0.4s, transform 0.8s var(--ease-expo) 0.4s;
}
.fullscreen-slider.active .slider-ui {
  opacity: 1;
  transform: translateY(0);
}

.slider-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: auto;
}

.btn-close {
  background: none; border: none; cursor: pointer;
  color: #fff; font-family: 'Space Grotesk', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
  padding: 1rem;
  transition: opacity 0.3s;
}
.btn-close:hover { opacity: 0.6; }

.slider-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: none;
}

.nav-arrow {
  background: none; border: none; cursor: pointer;
  color: #fff; font-size: 1.5rem; opacity: 0.3;
  transition: opacity 0.4s var(--ease-expo), transform 0.4s var(--ease-expo);
  pointer-events: auto;
  padding: 3rem;
}
.nav-arrow:hover { opacity: 1; transform: scale(1.2); }

.slider-top-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  text-align: right;
  pointer-events: none;
}
.slide-category {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.5em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 0.5rem;
  transition: color 0.4s;
}
.slide-category.dark { color: #000; }

.slide-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.2rem, 3vw, 2.2rem);
  font-weight: 700; letter-spacing: -0.01em;
  text-transform: uppercase;
  line-height: 1.1;
  transition: color 0.4s;
}
.slide-title.dark { color: #000; }

.slider-bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  pointer-events: auto;
}

.slider-counter {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.75rem; letter-spacing: 0.3em;
  color: var(--muted);
}

.thumb-strip {
  display: flex;
  gap: 16px;
}
.thumb {
  width: 56px; height: 56px;
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.4s var(--ease-expo), transform 0.4s var(--ease-expo);
  border: 1px solid transparent;
}
.thumb:hover { opacity: 0.6; transform: translateY(-4px); }
.thumb.active { opacity: 1; border-color: var(--gold); transform: translateY(-4px); }
.thumb img { width: 100%; height: 100%; object-fit: cover; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  nav { padding: 1rem 1.5rem; }
  .slider-ui { padding: 2rem; }
  .nav-arrow { padding: 1.5rem; }
}

@media (max-width: 768px) {
  nav { padding: 1rem 1.5rem; }
  .nav-links { display: none; }
  .nav-logo img { height: 22px !important; }
  .nav-cta { font-size: 0.55rem; padding: 0.5rem 1rem; }

  .gallery-container { flex-direction: column; }
  .strip { 
    height: calc(100vh / 9); 
    border-right: none; 
    border-bottom: 1px solid rgba(255,255,255,0.05); 
    transform: translateY(20px); 
    opacity: 0;
  }
  .strip img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover;
  }
  .strip:hover { flex: 1.2; }
  .strip-label { 
    opacity: 0.8 !important; 
    transform: translateY(0) !important;
    bottom: 50%;
    left: 1.5rem;
    transform: translateY(50%) !important;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
  }

  /* Slider adjustments */
  .slider-ui { padding: 1.5rem; }
  .slider-top-right { align-items: flex-end; }
  .slide-title { font-size: 1.4rem; }
  .slide-category { font-size: 0.55rem; letter-spacing: 0.3em; }
  .thumb-strip { display: none; }
  .nav-arrow { font-size: 1.2rem; padding: 1rem; }
}
</style>
</head>
<body>

<!-- ══ INTRO ══ -->
<div id="creative-intro">
  <h1 class="typewriter-text"><span id="typewriter"></span><span class="typewriter-cursor"></span></h1>
</div>

<!-- Expansion Layer (Temporary for animation) -->
<div class="expansion-layer" id="expansionLayer"></div>

<!-- ══ NAV ══ -->
<nav>
  <a href="home.html" class="nav-logo">
    <img src="bm-logo.png" alt="Bertram L. Moore III" style="height:28px; width:auto; filter: invert(1);" />
  </a>
  <ul class="nav-links">
    <li><a href="home.html">Home</a></li>
    <li><a href="work.html">Work</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="creative.html" style="opacity: 1; font-weight: 600;">Creative</a></li>
  </ul>
  <a href="index.html#contact" class="nav-cta">Let's Work</a>
</nav>

<!-- ══ STRIP GALLERY ══ -->
<div class="gallery-container" id="gallery">
  <!-- Strips dynamically injected by JS -->
</div>

<!-- ══ FULLSCREEN SLIDER ══ -->
<div class="fullscreen-slider" id="fullscreenSlider">
  
  <div id="slidesContainer" style="width:100%; height:100%;">
    <!-- Slides dynamically injected -->
  </div>

  <div class="slider-ui">
    <div class="slider-top">
      <button class="btn-close" id="btnClose">CLOSE</button>
      <div class="slider-top-right">
        <p class="slide-category" id="slideCat"></p>
        <h2 class="slide-title" id="slideTitle"></h2>
      </div>
    </div>

    <div class="slider-center">
      <button class="nav-arrow" id="btnPrev">←</button>
      <button class="nav-arrow" id="btnNext">→</button>
    </div>

    <div class="slider-bottom">
      <div class="slider-counter" id="sliderCounter"></div>
      <div class="thumb-strip" id="thumbStrip">
        <!-- Thumbs dynamically injected -->
      </div>
    </div>
  </div>
</div>

<script>
  const gallery = document.getElementById('gallery');
  const slider = document.getElementById('fullscreenSlider');
  const expansionLayer = document.getElementById('expansionLayer');
  const slidesContainer = document.getElementById('slidesContainer');
  const thumbStrip = document.getElementById('thumbStrip');
  const slideTitle = document.getElementById('slideTitle');
  const slideCat = document.getElementById('slideCat');
  const sliderCounter = document.getElementById('sliderCounter');
  const btnClose = document.getElementById('btnClose');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');

  /**
   * ══ GALLERY ASSETS ══
   * Edit this array to add/change your photos.
   * Titles and Categories will update automatically across the site.
   */
  const assets = [
    { src: 'images/chill_emi.jpg',            title: 'Emi - Dancer',           cat: 'Ballet' },
    { src: 'images/rachel.jpg',               title: 'Rachel',                cat: 'Visual Artist', themeTitle: 'light', themeCat: 'dark' },
    { src: 'images/caitlin_surprise.jpg',    title: 'Caitlin - Surprise',  cat: 'Portrait' },
    { src: 'images/mong_dope.jpg',           title: 'Mong - Dope',           cat: 'Culture' },
    { src: 'images/joelle.jpg',              title: 'Joelle',                cat: 'Portrait' },
    { src: 'images/jewel_museum_railing.jpg', title: 'Jewell - Museum',    cat: 'Portrait', themeTitle: 'dark', themeCat: 'dark', pos: '75% center' },
    { src: 'images/nicole_beauty_gamma.jpg', title: 'Nicole - Model', cat: 'Beauty', pos: '60% center', themeTitle: 'dark', themeCat: 'dark' },
    { src: 'images/sara_split_small.jpg',    title: 'Sara - Dancer',    cat: 'Ballet' },
    { src: 'images/high_museum_atl.jpg',     title: 'High Museum',           cat: 'Architecture' }
  ];

  let currentIndex = 0;
  let isAnimating = false;

  // 1. Build & Staggered Fly-in
  function initGallery() {
    assets.forEach((item, i) => {
      // Create Strip
      const strip = document.createElement('div');
      strip.className = 'strip';
      strip.dataset.index = i;
      strip.innerHTML = `
        <img src="${item.src}" alt="${item.title}" style="object-position: ${item.pos || '50% center'}">
        <span class="strip-label ${item.themeTitle === 'dark' ? 'dark' : ''}">${item.title}</span>
      `;
      
      // Bind Expansion Click
      strip.addEventListener('click', () => handleStripClick(strip, i));

      // Mouse Move Parallax
      strip.addEventListener('mousemove', (e) => {
        if (window.innerWidth <= 768) return;
        const img = strip.querySelector('img');
        const rect = strip.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const move = (x - 0.5) * 20; 
        img.style.transform = `translateX(calc(-50% + ${move}px)) scale(1.1)`;
      });

      strip.addEventListener('mouseleave', () => {
        const img = strip.querySelector('img');
        img.style.transform = `translateX(-50%) scale(1.1)`;
      });

      gallery.appendChild(strip);

      // Staggered appearance
      setTimeout(() => {
        strip.style.transform = 'translateY(0)';
        strip.style.opacity = '1';
      }, 400 + (i * 100));
    });
  }

  // 2. Build Slides & Thumbs
  function buildSlider() {
    assets.forEach((item, i) => {
      // Slide
      const slide = document.createElement('div');
      slide.className = `slide ${i === 0 ? 'active' : ''}`;
      slide.innerHTML = `<img src="${item.src}" alt="${item.title}">`;
      slidesContainer.appendChild(slide);

      // Thumb
      const thumb = document.createElement('div');
      thumb.className = `thumb ${i === 0 ? 'active' : ''}`;
      thumb.innerHTML = `<img src="${item.src}" alt="${item.title}">`;
      thumb.addEventListener('click', () => {
        if (currentIndex === i) return;
        goToSlide(i);
      });
      thumbStrip.appendChild(thumb);
    });
    updateUI();
  }

  function updateUI() {
    const item = assets[currentIndex];
    slideTitle.textContent = item.title;
    slideCat.textContent = item.cat;
    sliderCounter.textContent = `${currentIndex + 1} — ${assets.length}`;

    // Apply theme classes to modal UI
    if (item.themeTitle === 'dark') slideTitle.classList.add('dark');
    else slideTitle.classList.remove('dark');

    if (item.themeCat === 'dark') slideCat.classList.add('dark');
    else slideCat.classList.remove('dark');
  }

  function goToSlide(index) {
    if (isAnimating) return;
    const slides = document.querySelectorAll('.slide');
    const thumbs = document.querySelectorAll('.thumb');
    
    slides[currentIndex].classList.remove('active');
    thumbs[currentIndex].classList.remove('active');
    
    currentIndex = (index + assets.length) % assets.length;
    
    slides[currentIndex].classList.add('active');
    thumbs[currentIndex].classList.add('active');
    
    updateUI();
  }

  // 3. Expansion Transition Logic
  function handleStripClick(strip, i) {
    if (isAnimating) return;
    isAnimating = true;

    const rect = strip.getBoundingClientRect();
    
    // Setup expansion layer to match strip Exactly
    expansionLayer.style.top = `${rect.top}px`;
    expansionLayer.style.left = `${rect.left}px`;
    expansionLayer.style.width = `${rect.width}px`;
    expansionLayer.style.height = `${rect.height}px`;
    expansionLayer.style.opacity = '1';
    expansionLayer.innerHTML = `<img src="${assets[i].src}" style="object-fit:cover;">`;

    // Hide strip content temporarily
    strip.style.opacity = '0';

    // Animate expansion
    requestAnimationFrame(() => {
      expansionLayer.style.top = '0';
      expansionLayer.style.left = '0';
      expansionLayer.style.width = '100vw';
      expansionLayer.style.height = '100vh';
      
      setTimeout(() => {
        // Skip animating check for this direct call
        const oldAnim = isAnimating;
        isAnimating = false;
        goToSlide(i);
        isAnimating = oldAnim;
        
        slider.classList.add('active');
        document.querySelector('nav').style.opacity = '0';
        document.querySelector('nav').style.pointerEvents = 'none';
        
        setTimeout(() => {
          expansionLayer.style.opacity = '0';
          strip.style.opacity = '1';
          isAnimating = false;
        }, 800);
      }, 600);
    });
  }

  btnClose.onclick = () => {
    slider.classList.remove('active');
    document.querySelector('nav').style.opacity = '1';
    document.querySelector('nav').style.pointerEvents = 'auto';
  };

  btnPrev.onclick = () => goToSlide(currentIndex - 1);
  btnNext.onclick = () => goToSlide(currentIndex + 1);

  // Keyboard support
  window.addEventListener('keydown', (e) => {
    if (!slider.classList.contains('active')) return;
    if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
    if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
    if (e.key === 'Escape') btnClose.onclick();
  });

  window.addEventListener('load', () => {
    buildSlider();
    // Start Intro instead of immediate gallery init
    runIntro();
  });

  /**
   * ══ TYPEWRITER INTRO ══
   */
  function runIntro() {
    const text = "I never thought of myself as a creative,\nluckily...my imagination did";
    const container = document.getElementById('typewriter');
    const introOverlay = document.getElementById('creative-intro');
    let charIndex = 0;

    function type() {
      if (charIndex < text.length) {
        let currentChar = text.charAt(charIndex);
        
        container.textContent = text.substring(0, charIndex + 1);
        charIndex++;

        // Handle specific pauses
        let delay = 100;
        // Pause after the full ellipsis is typed
        if (charIndex >= 3 && text.substring(charIndex - 3, charIndex) === "...") {
          delay = 1200; 
        }

        setTimeout(type, delay);
      } else {
        // Done typing, fade out intro and start gallery
        setTimeout(() => {
          introOverlay.style.transition = 'opacity 1.5s ease, visibility 1.5s';
          introOverlay.style.opacity = '0';
          introOverlay.style.visibility = 'hidden';
          
          // Trigger Gallery Animation
          setTimeout(() => {
            initGallery();
          }, 500);
        }, 1500);
      }
    }

    // Start typing after a short initial delay
    setTimeout(type, 800);
  }
</script>

</body>
</html>
